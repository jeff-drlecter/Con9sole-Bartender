name: 🚀 Fly Deploy (Remote Builder Fallback)

on:
  push:
    branches: [ main ]   # push 上 main 時自動部署
  workflow_dispatch:      # 可以手動觸發

jobs:
  deploy:
    runs-on: ubuntu-latest

    concurrency:
      group: fly-deploy-${{ github.ref }}
      cancel-in-progress: true

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: python -m pip install --disable-pip-version-check -r requirements.txt

      - name: Validate Python source
        run: python -m compileall -q .

      - name: Run unit tests
        run: python -m unittest discover -s tests -v

      - name: Setup Flyctl
        uses: superfly/flyctl-actions/setup-flyctl@v1

      # （可選）顯示 fly.toml 幫助除錯
      - name: Show fly.toml
        run: cat fly.toml

      - name: Deploy to Fly.io
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: |
          # Remote builder 唔得就自動 fallback 本地
          flyctl deploy --remote-only || flyctl deploy --local-only

      - name: Verify Fly.io machine status
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}
        run: flyctl status --app con9sole-bartender
